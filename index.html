<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيد ميلاد سعيد! 🎉</title>
    <style>
        body {
            background: linear-gradient(135deg, #fed6e3 0%, #a8c1ef 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            color: #4a4a4a;
            padding: 50px 20px;
            margin: 0;
            overflow-x: hidden;
        }
        .card {
            background: rgba(255, 255, 255, 0.9);
            max-width: 500px;
            margin: auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }
        h1 {
            color: #ff4b72;
            font-size: 2.5rem;
            margin-bottom: 10px;
            animation: bounce 2s infinite;
        }
        p {
            font-size: 1.3rem;
            line-height: 1.6;
        }
        .cake {
            font-size: 4rem;
            margin: 20px 0;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="cake">🎂✨🎉🎈</div>
        <h1>كل سنة وأنت طيب يا حبيبي!</h1>
        
        <!-- كل سنة وإنت مش مجرد حد عادي في حياتي… إنت الاستثناء اللي ملوش تفسير ❤️
 انهارده ، نفسي أقولك إني مش بس بحتفل بعيد ميلادك، أنا كمان بحتفل بإنك دخلت حياتي وخليتها أحلى وألعب وأجمل.
فيك حاجة كده بتخليني أبتسم من غير سبب… ويمكن أحيانًا أتوتر شوية كأنك عارف تأثيرك عليّا 😉
كل سنة وإنت قريب مني أكتر، وكل سنة وإحساسك بيا يزيد،  😌
عيد ميلاد سعيد يا أجمل “مغامرة” حصلتلي 💛 -->
        
        <p>❤️ Smsma ❤️</p>
    </div>

</body>
</html>
